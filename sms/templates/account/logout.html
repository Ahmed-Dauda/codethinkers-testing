<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Out</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logout-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logout-icon {
      width: 64px;
      height: 64px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      border: 1px solid #fecaca;
    }

    .logout-icon svg {
      width: 28px;
      height: 28px;
      stroke: #dc2626;
    }

    .logout-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .logout-subtitle {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .logout-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      background: #dc2626;
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 8px rgba(220,38,38,0.25);
    }

    .logout-btn:hover {
      background: #b91c1c;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(220,38,38,0.35);
    }

    .logout-btn:active {
      transform: translateY(0);
    }

    .logout-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .logout-btn:hover svg {
      transform: translateX(2px);
    }

    .cancel-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      background: transparent;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      margin-top: 10px;
      letter-spacing: 0.01em;
    }

    .cancel-btn:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #0f172a;
      text-decoration: none;
    }

    .logout-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .logout-divider-line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .logout-divider-text {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="logout-card">

    <!-- Icon -->
    <div class="logout-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>

    <!-- Text -->
    <h2 class="logout-title">Sign Out</h2>
    <p class="logout-subtitle">Are you sure you want to sign out?<br>You'll need to log in again to continue.</p>

    <!-- Logout form -->
    <form method="post" action="{% url 'account_logout' %}" style="margin:0;padding:0;">
      {% csrf_token %}
      {% if redirect_field_value %}
      <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
      {% endif %}
      <button type="submit" class="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Yes, Sign Out
      </button>
    </form>

    <div class="logout-divider">
      <div class="logout-divider-line"></div>
      <span class="logout-divider-text">or</span>
      <div class="logout-divider-line"></div>
    </div>

    <!-- Cancel -->
    <a href="javascript:history.back()" class="cancel-btn">
      Go Back
    </a>

  </div>

</body>
</html>
