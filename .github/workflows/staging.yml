on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: EXAMSPOWER_STAGING_ENV
          script: |
            cd /var/www/examspower-staging

            # Save last working commit
            LAST_WORKING=$(git rev-parse HEAD)
            echo $LAST_WORKING > /tmp/examspower_staging_last_working

            # Pull new code
            git fetch origin
            git reset --hard origin/staging

            # Restore .env from GitHub secret
            echo "$EXAMSPOWER_STAGING_ENV" > .env
            chmod 600 .env
            echo ".env restored from secret"

            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            # Restart and verify
            systemctl restart examspower-staging
            sleep 10

            if ! systemctl is-active --quiet examspower-staging; then
              echo "Staging app down - rolling back"
              git reset --hard $LAST_WORKING
              echo "$EXAMSPOWER_STAGING_ENV" > .env
              systemctl restart examspower-staging
              sleep 10
              systemctl is-active --quiet examspower-staging || exit 1
            fi

            echo "Staging deploy successful"
        env:
          EXAMSPOWER_STAGING_ENV: ${{ secrets.EXAMSPOWER_STAGING_ENV }}

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ ExamsPower Staging Deploy Successful"
          to: codethinkersa@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            ExamsPower staging deployed successfully!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Preview at: https://staging.examspower.com

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ ExamsPower Staging Deploy FAILED"
          to: codethinkersa@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            ExamsPower staging deploy FAILED!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Check logs:
            https://github.com/Ahmed-Dauda/examspower/actions