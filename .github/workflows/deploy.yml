name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/codethinkers

            LAST_WORKING=$(git rev-parse HEAD)
            echo $LAST_WORKING > /tmp/codethinkers_last_working

            git fetch origin
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt

            mkdir -p /var/backups/codethinkers
            BACKUP_FILE=/var/backups/codethinkers/backup_$(date +%Y%m%d_%H%M%S).sqlite3
            cp /var/www/codethinkers/db.sqlite3 $BACKUP_FILE 2>/dev/null || echo "No SQLite DB found, skipping backup"
            echo "Backup saved: $BACKUP_FILE"
            ls -t /var/backups/codethinkers/*.sqlite3 | tail -n +8 | xargs rm -f 2>/dev/null


            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            systemctl restart codethinkers
            sleep 10

            if ! systemctl is-active --quiet codethinkers; then
              echo "Web app down - rolling back"
              git reset --hard $LAST_WORKING
              systemctl restart codethinkers
              sleep 10
              systemctl is-active --quiet codethinkers || exit 1
            fi

            echo "Deploy successful"