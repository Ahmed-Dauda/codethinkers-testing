name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/codethinkers
            # Ensure .env exists and has correct DATABASE_URL
            test -f .env || { echo ".env file missing - aborting deploy"; exit 1; }
            grep -q "postgres" .env || { echo "DATABASE_URL not set to postgres - aborting"; exit 1; }


            # ── Check and auto-fix Redis ──────────────────────────────────
            if ! redis-cli ping | grep -q PONG; then
              echo "Redis is DOWN - attempting auto-restart"
              systemctl restart redis
              sleep 5
              redis-cli ping | grep -q PONG || { echo "Redis failed to restart"; exit 1; }
              echo "Redis auto-restarted successfully"
            fi

            # ── Save last working commit ──────────────────────────────────
            LAST_WORKING=$(git rev-parse HEAD)
            echo $LAST_WORKING > /tmp/codethinkers_last_working

            # ── Pull new code ─────────────────────────────────────────────
            git fetch origin
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt

            # ── SQLite backup ─────────────────────────────────────────────
           
            mkdir -p /var/backups/codethinkers
            BACKUP_FILE=/var/backups/codethinkers/backup_$(date +%Y%m%d_%H%M%S).dump
            sudo -u postgres /usr/lib/postgresql/17/bin/pg_dump -Fc codethinkers > $BACKUP_FILE
            echo "Backup saved: $BACKUP_FILE"
            ls -t /var/backups/codethinkers/*.dump | tail -n +8 | xargs rm -f 2>/dev/null


            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            # ── Restart and verify ────────────────────────────────────────
            systemctl restart codethinkers
            sleep 10

            if ! systemctl is-active --quiet codethinkers; then
              echo "Web app down - rolling back"
              git reset --hard $LAST_WORKING
              systemctl restart codethinkers
              sleep 10
              systemctl is-active --quiet codethinkers || exit 1
            fi

            echo "Deploy successful"

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Codethinkers Deploy Successful"
          to: codethinkersa@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            Codethinkers deployed successfully!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Services Status:
            ✅ Web app: Running
            ✅ Redis: Running

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Codethinkers Deploy FAILED - Action Required"
          to: codethinkersa@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            Codethinkers deploy encountered issues!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Auto-fix was attempted but could not resolve all issues.
            Manual intervention may be required.

            Check full logs:
            https://github.com/Ahmed-Dauda/codethinkers-testing/actions