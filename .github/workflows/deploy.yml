name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: EXAMSPOWER_STAGING_ENV
          script: |
            cd /var/www/examspower-staging

            # ── Write .env from GitHub Secret ─────────────────────────────
            echo "$EXAMSPOWER_STAGING_ENV" > .env
            chmod 600 .env

            # Validate .env
            grep -q "postgres" .env || { echo "DATABASE_URL not set - aborting"; exit 1; }

            git fetch origin
            git reset --hard origin/staging
            source venv/bin/activate
            pip install -r requirements.txt
            python3 manage.py migrate --noinput
            python3 manage.py collectstatic --noinput

            # ── Restart staging services ──────────────────────────────────
            systemctl restart examspower-staging
            systemctl restart celery-examspower-staging
            sleep 10

            # ── Verify staging is up ──────────────────────────────────────
            ERRORS=""

            if ! systemctl is-active --quiet examspower-staging; then
              ERRORS="$ERRORS\n❌ Staging web app is DOWN"
            fi

            if ! systemctl is-active --quiet celery-examspower-staging; then
              ERRORS="$ERRORS\n❌ Staging Celery worker is DOWN"
            fi

            if [ -n "$ERRORS" ]; then
              echo -e "$ERRORS"
              exit 1
            fi

            echo "Staging deploy successful - test at https://staging.examspower.com"
        env:
          EXAMSPOWER_STAGING_ENV: ${{ secrets.EXAMSPOWER_STAGING_ENV }}

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ ExamsPower Staging Deploy Successful"
          to: codethinkersa@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            ExamsPower staging deployed successfully!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            ✅ Test it at: https://staging.examspower.com

            When satisfied, merge staging → main to deploy to production.

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ ExamsPower Staging Deploy FAILED"
          to: codethinkersa@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            ExamsPower staging deploy failed!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Fix the issue before merging to production.

            Check logs: https://github.com/Ahmed-Dauda/examspower/actions