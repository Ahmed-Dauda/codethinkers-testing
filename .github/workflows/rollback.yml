name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to rollback to (e.g. v1.1-stable)'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Rollback to stable tag
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/codethinkers
            git fetch origin --tags
            git reset --hard ${{ github.event.inputs.tag }}
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            systemctl restart codethinkers
            systemctl restart codethinkers-celery
            systemctl restart codethinkers-celerybeat
            sleep 10

            ERRORS=""

            if ! systemctl is-active --quiet codethinkers; then
              ERRORS="$ERRORS\n❌ Web app is DOWN"
            fi

            if ! systemctl is-active --quiet codethinkers-celery; then
              ERRORS="$ERRORS\n❌ Celery worker is DOWN"
            fi

            if ! systemctl is-active --quiet codethinkers-celerybeat; then
              ERRORS="$ERRORS\n❌ Celery beat is DOWN"
            fi

            if ! redis-cli ping | grep -q PONG; then
              ERRORS="$ERRORS\n❌ Redis is DOWN"
            fi

            if [ -n "$ERRORS" ]; then
              echo -e "$ERRORS"
              exit 1
            fi

            echo "Rollback to ${{ github.event.inputs.tag }} successful"