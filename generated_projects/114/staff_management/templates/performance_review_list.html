<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Review List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<h1>Performance Reviews</h1>{% for review in object_list %}<div>{{ review.staff.name }} - {{ review.review_date }}: {{ review.score }}</div>{% empty %}<div>No performance reviews available.</div>{% endfor %}
</body>
</html>
