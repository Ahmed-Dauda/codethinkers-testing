<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<h1>Attendance List</h1>{% for attendance in object_list %}<div>{{ attendance.staff.name }} - {{ attendance.date }}: {{ attendance.status }}</div>{% empty %}<div>No attendance records available.</div>{% endfor %}
</body>
</html>
