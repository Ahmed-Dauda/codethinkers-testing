<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>{% block title %}Blog{% endblock %}</title>
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-indigo-600 p-4'>
        <div class='container mx-auto'>
            <a href='/' class='text-white'>Home</a>
            <a href='/post/create/' class='text-white'>Create Post</a>
        </div>
    </nav>
    <div class='container mx-auto flex-grow'>
        {% block content %}{% endblock %}
    </div>
    {% block footer %}
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-8'>
            <div class='grid grid-cols-1 md:grid-cols-3 gap-8'>
                <div>
                    <h3 class='text-lg font-semibold mb-4'>Blog</h3>
                    <p class='text-gray-400 text-sm'>Your source for quality content.</p>
                </div>
                <div>
                    <h4 class='text-lg font-semibold mb-4'>Quick Links</h4>
                    <ul class='space-y-2 text-sm text-gray-400'>
                        <li><a href='/' class='hover:text-white transition'>Home</a></li>
                        <li><a href='/admin/' class='hover:text-white transition'>Admin</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class='text-lg font-semibold mb-4'>Connect</h4>
                    <ul class='space-y-2 text-sm text-gray-400'>
                        <li><a href='#' class='hover:text-white transition'>Twitter</a></li>
                        <li><a href='#' class='hover:text-white transition'>LinkedIn</a></li>
                    </ul>
                </div>
            </div>
            <div class='border-t border-gray-700 mt-8 pt-6 text-center text-sm text-gray-400'>
                &copy; {% now 'Y' %} Blog. All rights reserved.
            </div>
        </div>
    </footer>
    {% endblock %}
</body>
</html>
