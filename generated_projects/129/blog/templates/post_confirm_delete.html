{% extends 'base.html' %}
{% block content %}
<h1 class='text-2xl font-bold'>Delete Post</h1>
<p>Are you sure you want to delete '{{ object.title }}'?</p>
<form method='post'>
    {% csrf_token %}
    <button type='submit' class='bg-red-500 text-white'>Confirm Delete</button>
</form>
<a href='{% url 'post_list' %}' class='text-gray-500'>Cancel</a>
{% endblock %}
