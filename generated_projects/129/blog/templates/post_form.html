{% extends 'base.html' %}
{% block content %}
<h1 class='text-2xl font-bold'>Create Post</h1>
<form method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button type='submit' class='bg-blue-500 text-white'>Save</button>
</form>
<a href='{% url 'post_list' %}' class='text-gray-500'>Cancel</a>
{% endblock %}
