<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/your-fontawesome-kit-id.js" crossorigin="anonymous"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Expense Tracker</title>
</head>
<body class='flex flex-col min-h-screen'>
<nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
    <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
        <a href='/' class='text-xl font-bold text-indigo-600'>Expense Tracker</a>
        <div class='flex items-center space-x-6'>
            <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            <a href='/admin/' class='text-gray-600 hover:text-indigo-600 transition'>Admin</a>
        </div>
    </div>
</nav>
<div class='max-w-7xl mx-auto px-4 py-6'>
    <h1 class='text-2xl font-bold'>Dashboard</h1>
    <div class='grid grid-cols-3 gap-4'>
        <div class='bg-white shadow-md rounded-lg p-4'>
            <h2 class='text-lg font-semibold'>Total Expenses</h2>
            <p class='text-2xl text-indigo-600'>${{ total_expenses }}</p>
        </div>
        <div class='bg-white shadow-md rounded-lg p-4'>
            <h2 class='text-lg font-semibold'>Total Income</h2>
            <p class='text-2xl text-green-600'>${{ total_income }}</p>
        </div>
        <div class='bg-white shadow-md rounded-lg p-4'>
            <h2 class='text-lg font-semibold'>Total Categories</h2>
            <p class='text-2xl text-blue-600'>{{ total_categories }}</p>
        </div>
    </div>
</div>
<footer class='bg-gray-800 text-white mt-auto'>
    <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
