<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Patient Detail</title>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
            <div class="relative flex items-center justify-between h-16">
                <div class="flex-1 flex items-center justify-start">
                    <a href="{% url 'hospital:home' %}" class="text-lg font-bold">Hospital Management</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-6">
        <h1 class="text-2xl font-semibold mb-4">Patient Detail</h1>
        <div class="bg-white shadow-md rounded-lg p-4">
            <h2 class="font-bold text-lg">{{ patient.first_name }} {{ patient.last_name }}</h2>
            <p><strong>Date of Birth:</strong> {{ patient.date_of_birth }}</p>
            <p><strong>Email:</strong> {{ patient.email }}</p>
            <p><strong>Phone:</strong> {{ patient.phone }}</p>
            <p><strong>Address:</strong> {{ patient.address }}</p>
            <a href="{% url 'hospital:patient_update' patient.id %}" class="text-blue-500 hover:text-blue-700">Edit Patient</a>
        </div>
    </main>
    <footer class="bg-white text-center py-4">
        <p>&copy; 2023 Hospital Management System</p>
    </footer>
</body>
</html>
