<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>{% block title %}CBT Platform{% endblock %}</title>
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-white shadow'>
        <div class='max-w-7xl mx-auto px-4 py-6'>
            <h1 class='text-2xl font-bold'>CBT Platform</h1>
        </div>
    </nav>
    <div class='flex-grow'>{% block content %}{% endblock %}</div>
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
            &copy; {% now 'Y' %} CBT Platform. All rights reserved.
        </div>
    </footer>
</body>
</html>
