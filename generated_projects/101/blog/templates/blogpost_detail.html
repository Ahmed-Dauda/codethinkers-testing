<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogpost Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<h1>{{ object.title }}</h1><p>by {{ object.author }} on {{ object.created_at }}</p><div>{{ object.content }}</div><a href='{% url 'blog:blogpost_list' %}'>Back to Blog Posts</a>
</body>
</html>
