<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<h1>{{ object.name }}</h1>
<p>Email: {{ object.email }}</p>
<p>Department: {{ object.department.name }}</p>
<a href='{% url 'staff_records:employee_update' object.pk %}'>Edit</a>
<a href='{% url 'staff_records:employee_delete' object.pk %}'>Delete</a>
</body>
</html>
