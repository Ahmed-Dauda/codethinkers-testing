<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<h1>Book List</h1>
<ul>
    {% for book in object_list %}
        <li><a href='{% url 'library_management:book_detail' book.pk %}'>{{ book.title }}</a> by {{ book.author.name }}</li>
    {% endfor %}
</ul>
<a href='{% url 'library_management:book_create' %}'>Add Book</a>
</body>
</html>
