{% extends 'base.html' %}
{% block content %}
<h1>{{ quiz.question_text }}</h1>
<form action="{% url 'attempt_create' %}" method="post">
    {% csrf_token %}
    <input type="hidden" name="question" value="{{ quiz.pk }}">
    <label for="score">Score:</label>
    <input type="number" name="score" required>
    <button type="submit">Submit Attempt</button>
</form>
{% endblock %}
