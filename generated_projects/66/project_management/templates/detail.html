<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white">
        <h1 class="text-xl">Project Management</h1>
    </nav>
    <main class="max-w-4xl mx-auto p-4">
        <h2 class="text-2xl mb-4">{{ project.title }}</h2>
        <img src="https://picsum.photos/1200/400" class="w-full h-64 object-cover" alt="Hero">
        <p class="mt-4"><strong>Description:</strong> {{ project.description }}</p>
        <p><strong>Deadline:</strong> {{ project.deadline }}</p>
        <p><strong>Owner:</strong> {{ project.owner.name }} ({{ project.owner.email }})</p>
        <a href="{% url 'project_management:project_update' project.pk %}" class="mt-4 inline-block bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Edit Project</a>
    </main>
    <footer class="bg-gray-800 text-white text-center p-4">
        <p>&copy; 2023 Project Management</p>
    </footer>
</body>
</html>
