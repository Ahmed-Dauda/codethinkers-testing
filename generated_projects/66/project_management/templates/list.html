<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white">
        <h1 class="text-xl">Project Management</h1>
    </nav>
    <main class="max-w-4xl mx-auto p-4">
        <h2 class="text-2xl mb-4">Projects</h2>
        {% if projects %}
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for project in projects %}
                    <div class="bg-white shadow-md rounded-lg overflow-hidden">
                        <img src="https://picsum.photos/600/400?random={{ forloop.counter }}" class="w-full h-48 object-cover" loading="lazy" alt="{{ project.title }}">
                        <div class="p-4">
                            <h3 class="font-bold text-xl">{{ project.title }}</h3>
                            <p>{{ project.description }}</p>
                            <p class="text-gray-600">Deadline: {{ project.deadline }}</p>
                            <a href="{% url 'project_management:project_detail' project.pk %}" class="text-blue-500 hover:underline">View Details</a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>No items found.</p>
        {% endif %}
    </main>
    <footer class="bg-gray-800 text-white text-center p-4">
        <p>&copy; 2023 Project Management</p>
    </footer>
</body>
</html>
