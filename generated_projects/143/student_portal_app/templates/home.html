{% extends 'base.html' %}
{% block content %}
<h1>Welcome to the Student Portal</h1>
<div class='grid grid-cols-3 gap-4'>
    <div class='bg-white p-4 rounded shadow'>
        <h2 class='text-lg font-bold'>Total Students</h2>
        <p class='text-2xl'>{{ student_count }}</p>
    </div>
    <div class='bg-white p-4 rounded shadow'>
        <h2 class='text-lg font-bold'>Total Courses</h2>
        <p class='text-2xl'>{{ course_count }}</p>
    </div>
    <div class='bg-white p-4 rounded shadow'>
        <h2 class='text-lg font-bold'>Total Progress Records</h2>
        <p class='text-2xl'>{{ progress_count }}</p>
    </div>
</div>
{% endblock %}
