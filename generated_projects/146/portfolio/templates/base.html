<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ app_name }}</title>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold text-indigo-600">{{ app_name }}</a>
            <div class="space-x-4">
                <a href="#about" class="text-gray-600 hover:text-indigo-600">About</a>
                <a href="#skills" class="text-gray-600 hover:text-indigo-600">Skills</a>
                <a href="#projects" class="text-gray-600 hover:text-indigo-600">Projects</a>
                <a href="#experience" class="text-gray-600 hover:text-indigo-600">Experience</a>
                <a href="/contact/" class="text-gray-600 hover:text-indigo-600">Contact</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-4">
        {% block content %}{% endblock %}
    </div>
    <footer class="bg-gray-800 text-white mt-8">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm">
            &copy; {% now "Y" %} {{ app_name }}. All rights reserved.
        </div>
    </footer>
</body>
</html>
