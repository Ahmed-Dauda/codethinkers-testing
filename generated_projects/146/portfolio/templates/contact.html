{% extends 'base.html' %}
{% block content %}
<section class="py-20">
    <h2 class="text-3xl font-bold text-center">Contact Me</h2>
    <form method="post" class="mt-4 max-w-lg mx-auto">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Your Name" class="w-full p-2 border rounded mb-4" required>
        <input type="email" name="email" placeholder="Your Email" class="w-full p-2 border rounded mb-4" required>
        <textarea name="message" placeholder="Your Message" class="w-full p-2 border rounded mb-4" required></textarea>
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Send Message</button>
        {% if success %}
            <p class="mt-4 text-green-600">Message sent successfully!</p>
        {% endif %}
    </form>
</section>
{% endblock %}
