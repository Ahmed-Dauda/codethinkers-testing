<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ object.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen">
<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">Blog</a>
        <div class="flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-indigo-600 transition">Home</a>
            <a href="/admin/" class="text-gray-600 hover:text-indigo-600 transition">Admin</a>
        </div>
    </div>
</nav>
<main class="flex-grow">
    <h1 class="text-2xl font-bold p-4">{{ object.title }}</h1>
    <p>{{ object.content }}</p>
    <h2 class="text-xl font-semibold mt-4">Comments</h2>
    {% for comment in object.comment_set.all %}
        <div class="p-2 border-b">
            <p><strong>{{ comment.name }}</strong>: {{ comment.content }}</p>
        </div>
    {% empty %}
        <p>No comments yet.</p>
    {% endfor %}
</main>
<footer class="bg-gray-800 text-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
