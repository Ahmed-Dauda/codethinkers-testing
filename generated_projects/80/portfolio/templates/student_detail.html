<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Portfolio - Project Detail</title>
    
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
        <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
            <a href='/' class='text-xl font-bold text-indigo-600'>Portfolio</a>
            <div class='flex items-center space-x-6'>
                <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            </div>
        </div>
    </nav>
    <section class='project-detail py-20'>
        <div class='max-w-7xl mx-auto text-center'>
            <h2 class='text-3xl font-bold'>{{ project.title }}</h2>
            {% if project.image %}
                <img src='{{ project.image.url }}' alt='{{ project.title }} image' class='rounded shadow-lg mt-4'>
            {% endif %}
            <p>{{ project.description }}</p>
            <a href='{{ project.link }}' class='text-indigo-600'>View Project</a>
        </div>
    </section>
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
            &copy; 2026. All rights reserved.
        </div>
    </footer>
</body>
</html>
