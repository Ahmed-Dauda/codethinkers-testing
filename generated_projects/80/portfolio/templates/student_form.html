<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Portfolio - Add Project</title>
    
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
        <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
            <a href='/' class='text-xl font-bold text-indigo-600'>Portfolio</a>
            <div class='flex items-center space-x-6'>
                <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            </div>
        </div>
    </nav>
    <section class='add-project py-20'>
        <div class='max-w-7xl mx-auto text-center'>
            <h2 class='text-3xl font-bold'>Add Project</h2>
            <form action='' method='post' class='mt-4'>
                {% csrf_token %}
                <input type='text' name='title' placeholder='Project Title' class='border p-2 rounded' required>
                <textarea name='description' placeholder='Project Description' class='border p-2 rounded' required></textarea>
                <input type='url' name='link' placeholder='Project Link' class='border p-2 rounded' required>
                <button type='submit' class='bg-indigo-600 text-white px-4 py-2 rounded'>Add Project</button>
            </form>
        </div>
    </section>
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
            &copy; 2026. All rights reserved.
        </div>
    </footer>
</body>
</html>
