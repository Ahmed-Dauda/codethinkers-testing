<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">Inventory</a>
        <div class="flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-indigo-600 transition">Home</a>
            <a href="/admin/" class="text-gray-600 hover:text-indigo-600 transition">Admin</a>
        </div>
    </div>
</nav>
<div class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Product Catalog</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for obj in objects %}
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <img src="https://picsum.photos/600/400?random={{ forloop.counter }}" class="w-full h-48 object-cover" loading="lazy" alt="{{ obj.name }}">
            <div class="p-4">
                <h2 class="text-lg font-semibold">{{ obj.name }}</h2>
                <p>Category: {{ obj.category }}</p>
                <p>Price: ${{ obj.price }}</p>
                <p>Quantity: {{ obj.quantity }}</p>
            </div>
        </div>
        {% empty %}
        <p>No items found.</p>
        {% endfor %}
    </div>
</div>
<footer class="bg-gray-800 text-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
        &copy; 2026. All rights reserved.
    </div>
</footer>
