<script src="https://cdn.tailwindcss.com"></script>

<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">Inventory</a>
        <div class="flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-indigo-600 transition">Home</a>
            <a href="/admin/" class="text-gray-600 hover:text-indigo-600 transition">Admin</a>
        </div>
    </div>
</nav>
<div class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Register Product</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700">Product Name</label>
            <input type="text" name="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Category</label>
            <input type="text" name="category" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Price</label>
            <input type="number" name="price" step="0.01" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Quantity</label>
            <input type="number" name="quantity" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Product Image</label>
            <input type="file" name="image" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm" required>
        </div>
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Register Product</button>
    </form>
</div>
<footer class="bg-gray-800 text-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
        &copy; 2026. All rights reserved.
    </div>
</footer>
