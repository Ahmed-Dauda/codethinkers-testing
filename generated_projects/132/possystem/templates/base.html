<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>{% block title %}POS System{% endblock %}</title>
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-indigo-600 p-4'>
        <h1 class='text-white text-lg'>POS System</h1>
    </nav>
    <main class='flex-grow p-4'>
        {% block content %}{% endblock %}
    </main>
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
            &copy; {% now 'Y' %} POS System. Internal use only. All rights reserved.
        </div>
    </footer>
</body>
</html>
