<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white">
        <h1 class="text-xl">Exams Management</h1>
    </nav>
    <main class="max-w-7xl mx-auto p-4">
        <h2 class="text-2xl mb-4">Exams</h2>
        {% if objects %}
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for obj in objects %}
                    <div class="bg-white shadow-md rounded-lg overflow-hidden">
                        <img src="https://picsum.photos/600/400?random={{ forloop.counter }}" class="w-full h-48 object-cover" loading="lazy" alt="{{ obj.title }}">
                        <div class="p-4">
                            <h3 class="text-lg font-semibold">{{ obj.title }}</h3>
                            <p>Date: {{ obj.date }}</p>
                            <p>Duration: {{ obj.duration }}</p>
                            <p>Total Marks: {{ obj.total_marks }}</p>
                            <p>Description: {{ obj.description }}</p>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>No items found.</p>
        {% endif %}
    </main>
    <footer class="bg-blue-600 p-4 text-white text-center">
        <p>&copy; 2023 Exams Management System</p>
    </footer>
</body>
</html>
