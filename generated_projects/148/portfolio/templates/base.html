<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>{{ app_name }}</title>
</head>
<body class='bg-gray-100'>
    <nav class='bg-white shadow'>
        <div class='max-w-7xl mx-auto px-4 py-4'>
            <a href='/' class='text-xl font-bold'>{{ app_name }}</a>
            <div class='flex space-x-4'>
                <a href='/' class='text-gray-600'>Home</a>
                <a href='/about/' class='text-gray-600'>About</a>
                <a href='/skills/' class='text-gray-600'>Skills</a>
                <a href='/projects/' class='text-gray-600'>Projects</a>
                <a href='/experience/' class='text-gray-600'>Experience</a>
                <a href='/resume/' class='text-gray-600'>Resume</a>
                <a href='/contact/' class='text-gray-600'>Contact</a>
            </div>
        </div>
    </nav>
    <div class='container mx-auto py-8'>{% block content %}{% endblock %}</div>
    <footer class='bg-gray-800 text-white py-4'>
        <div class='max-w-7xl mx-auto text-center'>
            &copy; {% now 'Y' %} {{ app_name }}. All rights reserved.
        </div>
    </footer>
</body>
</html>
