{% extends 'base.html' %}
{% block title %}Blog Posts{% endblock %}
{% block content %}
<h1>Blog Posts</h1>
{% for post in object_list %}
    <h2><a href='{% url 'blog:post_detail' post.pk %}'>{{ post.title }}</a></h2>
    <p>{{ post.created_at }}</p>
{% empty %}
    <p>No posts available.</p>
{% endfor %}
{% include 'components/pagination.html' %}
{% endblock %}
