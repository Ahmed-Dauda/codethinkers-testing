<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Create/Edit Post</title>
    
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
        <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
            <a href='/' class='text-xl font-bold text-indigo-600'>Blog</a>
            <div class='flex items-center space-x-6'>
                <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
                <a href='/admin/' class='text-gray-600 hover:text-indigo-600 transition'>Admin</a>
            </div>
        </div>
    </nav>
    <main class='flex-grow container mx-auto px-4 py-6'>
        <h1 class='text-2xl font-bold'>{{ form.instance.pk|yesno:'Edit Post,Create Post' }}</h1>
        <form method='post' enctype='multipart/form-data'>
            {% csrf_token %}
            {{ form.as_p }}
            <button type='submit' class='bg-indigo-600 text-white px-4 py-2 rounded'>Save</button>
        </form>
    </main>
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
            &copy; 2026. All rights reserved.
        </div>
    </footer>
</body>
</html>
