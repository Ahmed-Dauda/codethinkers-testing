{% extends 'base.html' %}
{% block title %}Create Blog Post{% endblock %}
{% block content %}
  <h2>Create Blog Post</h2>
  <form method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button type='submit'>Save</button>
  </form>
  <a href='{% url 'blog:blogpost_list' %}'>Cancel</a>
{% endblock %}
