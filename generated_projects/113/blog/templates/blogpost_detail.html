{% extends 'base.html' %}
{% block title %}{{ object.title }}{% endblock %}
{% block content %}
  <h2>{{ object.title }}</h2>
  <p>{{ object.content }}</p>
  <p>Author: {{ object.author }}</p>
  <p>Created at: {{ object.created_at }}</p>
  <a href='{% url 'blog:blogpost_list' %}'>Back to Posts</a>
{% endblock %}
