<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>{{ app_name }}</title>
</head>
<body class='flex flex-col min-h-screen'>
    <nav class='bg-white shadow sticky top-0'>
        <div class='max-w-7xl mx-auto px-4 py-4'>
            <h1 class='text-xl font-bold'>{{ app_name }}</h1>
        </div>
    </nav>
    <div class='flex-grow'>
        {% block content %}{% endblock %}
    </div>
    {% block footer %}
    <footer class='bg-gray-800 text-white mt-auto'>
        <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
            &copy; {% now 'Y' %} {{ app_name }}. Internal use only. All rights reserved.
        </div>
    </footer>
    {% endblock %}
</body>
</html>
