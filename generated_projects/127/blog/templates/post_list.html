{% extends 'base.html' %}
{% block content %}
<h2>Blog Posts</h2>
<ul>
{% for post in object_list %}
<li><a href='{% url 'post_detail' post.pk %}'>{{ post.title }}</a> by {{ post.author }} on {{ post.created_at }}</li>
{% endfor %}
</ul>
<a href='{% url 'post_create' %}'>Create New Post</a>
{% endblock %}
