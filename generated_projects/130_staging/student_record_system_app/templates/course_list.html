{% extends 'base.html' %}
{% block content %}
<h2 class='text-2xl font-bold'>Courses</h2>
<ul>
    {% for course in object_list %}
        <li>{{ course.name }} - <a href='{% url 'student_record_system_app:course_detail' course.pk %}'>View</a></li>
    {% endfor %}
</ul>
<a href='{% url 'student_record_system_app:course_create' %}' class='bg-blue-500 text-white p-2'>Add Course</a>
{% endblock %}
