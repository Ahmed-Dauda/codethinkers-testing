{% extends 'base.html' %}
{% block content %}
<h2 class='text-2xl font-bold'>{{ object.name }}</h2>
<p>Description: {{ object.description }}</p>
<a href='{% url 'student_record_system_app:course_update' object.pk %}' class='bg-yellow-500 text-white p-2'>Edit</a>
<a href='{% url 'student_record_system_app:course_delete' object.pk %}' class='bg-red-500 text-white p-2'>Delete</a>
<a href='{% url 'student_record_system_app:course_list' %}' class='bg-gray-500 text-white p-2'>Back to List</a>
{% endblock %}
