{% extends 'base.html' %}
{% block content %}
<h2 class='text-2xl font-bold'>Enrollments</h2>
<ul>
    {% for enrollment in object_list %}
        <li>{{ enrollment.student }} enrolled in {{ enrollment.course }} - <a href='{% url 'student_record_system_app:enrollment_detail' enrollment.pk %}'>View</a></li>
    {% endfor %}
</ul>
<a href='{% url 'student_record_system_app:enrollment_create' %}' class='bg-blue-500 text-white p-2'>Add Enrollment</a>
{% endblock %}
