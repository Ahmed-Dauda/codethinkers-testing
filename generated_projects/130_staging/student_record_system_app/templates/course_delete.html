{% extends 'base.html' %}
{% block content %}
<h2 class='text-2xl font-bold'>Delete Course</h2>
<p>Are you sure you want to delete {{ object.name }}?</p>
<form method='post'>
    {% csrf_token %}
    <button type='submit' class='bg-red-500 text-white p-2'>Confirm Delete</button>
</form>
<a href='{% url 'student_record_system_app:course_list' %}' class='bg-gray-500 text-white p-2'>Cancel</a>
{% endblock %}
