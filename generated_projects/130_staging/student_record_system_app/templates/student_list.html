{% extends 'base.html' %}
{% block content %}
<h2 class='text-2xl font-bold'>Students</h2>
<ul>
    {% for student in object_list %}
        <li>{{ student.first_name }} {{ student.last_name }} - <a href='{% url 'student_record_system_app:student_detail' student.pk %}'>View</a></li>
    {% endfor %}
</ul>
<a href='{% url 'student_record_system_app:student_create' %}' class='bg-blue-500 text-white p-2'>Add Student</a>
{% endblock %}
