<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">{{ app_name }}</a>
        <div class="flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-indigo-600 transition">Home</a>
            <a href="/admin/" class="text-gray-600 hover:text-indigo-600 transition">Admin</a>
            <a href="{% url 'ict_visits:export_to_csv' %}" class="text-gray-600 hover:text-indigo-600 transition">Export to CSV</a>
        </div>
    </div>
</nav>
<div class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-4">Student Visits</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for obj in objects %}
        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <img src="https://picsum.photos/600/400?random={{ forloop.counter }}" class="w-full h-48 object-cover" loading="lazy" alt="{{ obj.student_name }}">
            <div class="p-4">
                <h2 class="text-xl font-semibold">{{ obj.student_name }}</h2>
                <p class="text-gray-600">Visit Time: {{ obj.visit_time }}</p>
                <p class="text-gray-600">Purpose: {{ obj.purpose }}</p>
            </div>
        </div>
        {% empty %}
        <p>No items found.</p>
        {% endfor %}
    </div>
</div>
<footer class="bg-gray-800 text-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
