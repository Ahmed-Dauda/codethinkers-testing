<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
            <div class="relative flex items-center justify-between h-16">
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                    <button class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 focus:outline-none" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                    </button>
                </div>
                <div class="flex-1 flex items-center justify-center sm:items-stretch sm:justify-start">
                    <div class="flex-shrink-0">
                        <h1 class="text-xl font-bold">Blog Management</h1>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-6">
        <h2 class="text-2xl font-semibold mb-4">Posts</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for post in posts %}
                <div class="bg-white shadow-md rounded-lg overflow-hidden">
                    <img src="https://picsum.photos/600/400?random={{ forloop.counter }}" class="w-full h-48 object-cover" loading="lazy" alt="{{ post.title }}">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">{{ post.title }}</h3>
                        <p class="text-gray-600">{{ post.content|truncatewords:20 }}</p>
                        <a href="{% url 'blog:post_detail' post.pk %}" class="text-blue-500 hover:underline">Read more</a>
                    </div>
                </div>
            {% empty %}
                <p>No items found.</p>
            {% endfor %}
        </div>
    </main>
    <footer class="bg-white shadow mt-6">
        <div class="max-w-7xl mx-auto py-4 text-center">
            <p class="text-gray-600">© 2023 Blog Management System</p>
        </div>
    </footer>
</body>
</html>
