{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<h1>Are you sure you want to delete '{{ object.title }}'?</h1>
<form method='post'>
  {% csrf_token %}
  <button type='submit'>Confirm</button>
</form>
<a href='{% url 'simple_blog_app:post_list' %}'>Cancel</a>
{% endblock %}
