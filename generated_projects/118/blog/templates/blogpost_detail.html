{% extends 'base.html' %}
{% block content %}
<h1>{{ object.title }}</h1>
<p>{{ object.content }}</p>
<p>Written by {{ object.author }} on {{ object.created_at }}</p>
<a href='{% url 'blog:blogpost_update' object.pk %}'>Edit</a>
<a href='{% url 'blog:blogpost_delete' object.pk %}'>Delete</a>
{% endblock %}
