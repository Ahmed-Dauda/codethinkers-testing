<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<h1>Blog Posts</h1><ul>{% for post in object_list %}<li><a href='{% url 'blog:post_detail' post.pk %}'>{{ post.title }}</a> by {{ post.author }} on {{ post.created_at }}</li>{% endfor %}</ul>
</body>
</html>
