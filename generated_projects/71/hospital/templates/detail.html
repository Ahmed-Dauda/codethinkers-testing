<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Patient Detail</title>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white">
        <h1 class="text-lg font-bold">Hospital Management System</h1>
    </nav>
    <main class="max-w-4xl mx-auto p-4">
        <h2 class="text-2xl font-semibold mb-4">Patient Details</h2>
        <div class="bg-white shadow-md rounded-lg p-4">
            <h3 class="font-bold text-lg">{{ patient.first_name }} {{ patient.last_name }}</h3>
            <p><strong>Age:</strong> {{ patient.age }}</p>
            <p><strong>Gender:</strong> {{ patient.gender }}</p>
            <p><strong>Address:</strong> {{ patient.address }}</p>
            <p><strong>Phone:</strong> {{ patient.phone_number }}</p>
            <p><strong>Email:</strong> {{ patient.email }}</p>
            <a href="{% url 'hospital:patient_update' patient.id %}" class="text-blue-500 hover:underline">Edit</a>
        </div>
    </main>
    <footer class="bg-blue-600 p-4 text-white text-center">
        <p>&copy; 2023 Hospital Management System</p>
    </footer>
</body>
</html>
