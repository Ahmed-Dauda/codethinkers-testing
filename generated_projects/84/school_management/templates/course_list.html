<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>Course List</title>
</head>
<body class='flex flex-col min-h-screen'>
<nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
    <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
        <a href='/' class='text-xl font-bold text-indigo-600'>School Management</a>
        <div class='flex items-center space-x-6'>
            <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            <a href='/admin/' class='text-gray-600 hover:text-indigo-600 transition'>Admin</a>
        </div>
    </div>
</nav>
<main class='flex-grow container mx-auto px-4 py-6'>
    <h1 class='text-2xl font-bold mb-4'>Course List</h1>
    {% if courses %}
        <table class='min-w-full bg-white border border-gray-200'>
            <thead>
                <tr>
                    <th class='py-2 px-4 border-b'>Title</th>
                    <th class='py-2 px-4 border-b'>Teacher</th>
                    <th class='py-2 px-4 border-b'>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for course in courses %}
                    <tr>
                        <td class='py-2 px-4 border-b'>{{ course.title }}</td>
                        <td class='py-2 px-4 border-b'>{{ course.teacher.name }}</td>
                        <td class='py-2 px-4 border-b'>
                            <a href='{% url 'school_management:course_detail' course.pk %}' class='text-indigo-600 hover:underline'>View</a>
                            <a href='{% url 'school_management:course_update' course.pk %}' class='text-indigo-600 hover:underline'>Edit</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No courses found.</p>
    {% endif %}
</main>
<footer class='bg-gray-800 text-white mt-auto'>
    <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
