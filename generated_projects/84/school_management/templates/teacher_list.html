<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <title>Teacher List</title>
</head>
<body class='flex flex-col min-h-screen'>
<nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
    <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
        <a href='/' class='text-xl font-bold text-indigo-600'>School Management</a>
        <div class='flex items-center space-x-6'>
            <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            <a href='/admin/' class='text-gray-600 hover:text-indigo-600 transition'>Admin</a>
        </div>
    </div>
</nav>
<main class='flex-grow container mx-auto px-4 py-6'>
    <h1 class='text-2xl font-bold mb-4'>Teacher List</h1>
    {% if teachers %}
        <div class='grid grid-cols-1 md:grid-cols-2 gap-6'>
            {% for teacher in teachers %}
                <div class='bg-white shadow-lg rounded-lg p-6'>
                    <div class='flex items-center'>
                        <img src='https://picsum.photos/50' alt='Icon' class='mr-4'>
                        <h2 class='text-xl font-semibold'>{{ teacher.name }}</h2>
                    </div>
                    <p>Subject: {{ teacher.subject }}</p>
                    <a href='{% url 'school_management:teacher_detail' teacher.pk %}' class='text-indigo-600 hover:underline'>View</a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No teachers found.</p>
    {% endif %}
</main>
<footer class='bg-gray-800 text-white mt-auto'>
    <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
