<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>School Management System</title>
</head>
<body class='flex flex-col min-h-screen bg-gray-100'>
<nav class='bg-white shadow-md border-b border-gray-200 sticky top-0 z-50'>
    <div class='max-w-7xl mx-auto px-6 py-4 flex justify-between items-center'>
        <a href='/' class='text-2xl font-bold text-indigo-600'>School Management</a>
        <div class='flex items-center space-x-6'>
            <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            <a href='/admin/' class='text-gray-600 hover:text-indigo-600 transition'>Admin</a>
        </div>
    </div>
</nav>
<main class='flex-grow container mx-auto px-6 py-8'>
    <h1 class='text-4xl font-bold mb-4'>Welcome to the School Management System!</h1>
    <div class='flex items-center mb-4'>
        <i class='fas fa-user-graduate mr-4'></i>
        <h2 class='text-xl font-semibold'>Total Students: <span class='text-indigo-600'>{{ students.count }}</span></h2>
    </div>
    <div class='flex items-center mb-4'>
        <i class='fas fa-chalkboard-teacher mr-4'></i>
        <h2 class='text-xl font-semibold'>Total Teachers: <span class='text-indigo-600'>{{ teachers }} </span></h2>
    </div>
    <div class='flex items-center mb-4'>
        <i class='fas fa-book-open mr-4'></i>
        <h2 class='text-xl font-semibold'>Total Courses: <span class='text-indigo-600'>{{ courses }}</span></h2>
    </div>
</main>
<footer class='bg-gray-800 text-white mt-auto'>
    <div class='max-w-7xl mx-auto px-6 py-4 text-center text-sm text-gray-400'>
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
