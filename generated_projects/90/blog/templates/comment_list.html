<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">Blog</a>
        <div class="flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-indigo-600 transition">Home</a>
            <a href="/admin/" class="text-gray-600 hover:text-indigo-600 transition">Admin</a>
        </div>
    </div>
</nav>
<div class="max-w-7xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Comments</h1>
    {% for comment in object_list %}
        <div class="bg-white shadow-md rounded-lg p-4 mb-4">
            <p><strong>{{ comment.author }}:</strong> {{ comment.content }}</p>
            <p class="text-gray-500">Posted on {{ comment.created_at }}</p>
        </div>
    {% empty %}
        <p>No comments found.</p>
    {% endfor %}
</div>
<footer class="bg-gray-800 text-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
