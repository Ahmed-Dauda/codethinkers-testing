<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>{{ post.title }}</title>
    
</head>
<body class='flex flex-col min-h-screen'>
<nav class='bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50'>
    <div class='max-w-7xl mx-auto px-4 py-3 flex justify-between items-center'>
        <a href='/' class='text-xl font-bold text-indigo-600'>Blog</a>
        <div class='flex items-center space-x-6'>
            <a href='/' class='text-gray-600 hover:text-indigo-600 transition'>Home</a>
            <a href='/admin/' class='text-gray-600 hover:text-indigo-600 transition'>Admin</a>
        </div>
    </div>
</nav>
<div class='max-w-7xl mx-auto px-4 py-6'>
    <h1 class='text-2xl font-bold'>{{ post.title }}</h1>
    {% if post.image %}
        <img src='{{ post.image.url }}' alt='{{ post.title }}' class='rounded-lg shadow-md my-4' />
    {% endif %}
    <p>{{ post.content }}</p>
    <h2 class='text-lg font-semibold mt-4'>Comments</h2>
    <div>
        {% for comment in post.comments.all %}
        <div class='bg-gray-100 p-2 my-2 rounded'>
            <p>{{ comment.content }}</p>
        </div>
        {% empty %}
        <p>No comments yet.</p>
        {% endfor %}
    </div>
    <h3 class='text-lg font-semibold mt-4'>Leave a Comment</h3>
    <form method='post'>
        {% csrf_token %}
        <textarea name='content' class='border rounded w-full p-2' placeholder='Write your comment here...'></textarea>
        <button type='submit' class='bg-indigo-600 text-white px-4 py-2 rounded mt-2'>Submit</button>
    </form>
</div>
<footer class='bg-gray-800 text-white mt-auto'>
    <div class='max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400'>
        &copy; 2026. All rights reserved.
    </div>
</footer>
</body>
</html>
