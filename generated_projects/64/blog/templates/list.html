<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Blog Posts</title>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <h1 class="text-2xl font-bold">Blog Management</h1>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-xl font-semibold mb-4">Posts</h2>
        {% if posts %}
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for post in posts %}
                    <div class="bg-white shadow-md rounded-lg overflow-hidden">
                        <img src="https://picsum.photos/600/400?random={{ forloop.counter }}" class="w-full h-48 object-cover" loading="lazy" alt="{{ post.title }}">
                        <div class="p-4">
                            <h3 class="font-bold text-lg">{{ post.title }}</h3>
                            <p class="text-gray-700">{{ post.content|truncatewords:20 }}</p>
                            <a href="{% url 'blog:post_detail' post.pk %}" class="text-blue-500 hover:underline">Read more</a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>No items found.</p>
        {% endif %}
    </main>
    <footer class="bg-white shadow mt-6">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center">
            <p>&copy; 2023 Blog Management System</p>
        </div>
    </footer>
</body>
</html>
