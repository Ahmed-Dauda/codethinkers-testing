<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>{{ post.title }}</title>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <h1 class="text-2xl font-bold">Blog Management</h1>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-semibold mb-4">{{ post.title }}</h2>
        <img src="https://picsum.photos/1200/400" class="w-full h-64 object-cover" alt="Hero">
        <p class="mt-4">{{ post.content }}</p>
        <h3 class="text-xl font-semibold mt-6">Comments</h3>
        {% for comment in comments %}
            <div class="bg-white shadow-md rounded-lg p-4 mb-4">
                <div class="flex items-center">
                    <img src="https://i.pravatar.cc/100?img={{ forloop.counter }}" class="w-8 h-8 rounded-full" alt="Avatar">
                    <p class="ml-2 font-bold">{{ comment.name }}</p>
                </div>
                <p class="text-gray-700 mt-2">{{ comment.content }}</p>
            </div>
        {% empty %}
            <p>No comments yet.</p>
        {% endfor %}
        <h3 class="text-lg font-semibold mt-6">Leave a Comment</h3>
        <form method="post" class="mt-4">
            {% csrf_token %}
            {{ comment_form.as_p }}
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button>
        </form>
    </main>
    <footer class="bg-white shadow mt-6">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center">
            <p>&copy; 2023 Blog Management System</p>
        </div>
    </footer>
</body>
</html>
